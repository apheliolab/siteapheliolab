server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  charset utf-8;

  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  server_tokens off;

  if ($request_method !~ ^(GET|HEAD|POST)$) {
    return 405;
  }

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
  add_header Strict-Transport-Security "max-age=31536000" always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self' https://n8n.apheliolab.com https://aphelio-landing-n8n.wxugbb.easypanel.host https://landing-apheliolab-n8n.wxugbb.easypanel.host; script-src 'self' 'unsafe-inline' https://connect.facebook.net; connect-src 'self' https://n8n.apheliolab.com https://aphelio-landing-n8n.wxugbb.easypanel.host https://landing-apheliolab-n8n.wxugbb.easypanel.host https://www.facebook.com https://connect.facebook.net; img-src 'self' data: https://www.facebook.com; style-src 'self' 'unsafe-inline'; font-src 'self' data:; upgrade-insecure-requests" always;

  location ~ /\.(?!well-known) {
    deny all;
  }

  location = /index.html {
    return 301 /;
  }

  location = /sucesso.html {
    return 301 /sucesso;
  }

  location = /sucesso/ {
    return 301 /sucesso;
  }

  location = /sucesso {
    expires -1;
    try_files /sucesso.html =404;
  }

  location = / {
    expires -1;
    try_files /index.html =404;
  }

  location ~* \.(?:css|js|png|jpg|jpeg|gif|ico|svg|webp)$ {
    access_log off;
    expires 30d;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ =404;
  }
}
