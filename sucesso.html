<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="description" content="Mensagem enviada com sucesso para a equipe da Aphelio Lab." />
    <title>Mensagem enviada | Aphelio Lab</title>
    <link rel="icon" type="image/png" href="assets/favicon.png" />
    <link rel="apple-touch-icon" href="assets/favicon.png" />
    <link rel="stylesheet" href="styles.css?v=20260420-19" />
  </head>
  <body class="success-page">
    <main class="success-card" aria-labelledby="success-title">
      <img class="success-logo" src="assets/aphelio-logo.png" alt="Aphelio Lab" width="260" decoding="async" />

      <div class="success-check" aria-hidden="true">
        <svg viewBox="0 0 72 72" focusable="false">
          <circle cx="36" cy="36" r="30" />
          <path d="m23 37 9 9 18-21" />
        </svg>
      </div>

      <p class="eyebrow">Processamento concluído</p>
      <h1 id="success-title">Mensagem enviada com sucesso!</h1>
      <p>Recebemos suas informações e vamos continuar seu atendimento pelo WhatsApp.</p>

      <div class="success-actions" aria-label="Próximos passos">
        <a class="button secondary" href="/">Voltar para o site</a>
        <a class="button primary" id="whatsapp-link" href="https://wa.me/5535999096959" target="_blank" rel="noopener noreferrer">
          Falar agora no WhatsApp
        </a>
      </div>

      <p class="success-countdown">
        Você será encaminhado para o WhatsApp em <span id="success-count">10</span> segundos...
      </p>
    </main>

    <script>
      const countElement = document.getElementById("success-count");
      const whatsappLink = document.getElementById("whatsapp-link");
      const whatsappNumber = "5535999096959";
      const message = ["Olá, vim da landing page..."];
      const params = new URLSearchParams(window.location.search);
      let seconds = 10;

      const appendLeadContext = (leadContext) => {
        if (leadContext.nicho) {
          message.push(`Nicho: ${leadContext.nicho}`);
        }

        if (leadContext.necessidade) {
          message.push(`Necessidade: ${leadContext.necessidade}`);
        }
      };

      const urlLeadContext = {
        nicho: params.get("nicho") || "",
        necessidade: params.get("necessidade") || "",
      };

      if (urlLeadContext.nicho || urlLeadContext.necessidade) {
        appendLeadContext(urlLeadContext);
      } else {
        try {
        const leadContext = JSON.parse(window.sessionStorage.getItem("aphelioLeadContext") || "{}");
          appendLeadContext(leadContext);
        } catch (error) {
          // Keep the base message if the browser blocks session storage.
        }
      }

      const whatsappUrl = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message.join("\n"))}`;

      if (whatsappLink) {
        whatsappLink.href = whatsappUrl;
      }

      const countdown = window.setInterval(() => {
        seconds -= 1;

        if (countElement) {
          countElement.textContent = seconds;
        }

        if (seconds <= 0) {
          window.clearInterval(countdown);
          window.location.href = whatsappUrl;
        }
      }, 1000);
    </script>
  </body>
</html>
